<h1><i>&mdash; cash.animate &mdash;</i>Card animation</h1>

<button id="playAll" class="btn">Play all</button> <button class="btn" onclick="location.reload(true)">Reload</button>


<div id="loader" class="load"></div>

<div class="card">
  
  <div class="left"></div>
  
  <div class="right">
    
    <img class="buddy" src="//farm4.staticflickr.com/3932/buddyicons/43830692@N04_r.jpg?1413100041#43830692@N04">
    
    <i class="head">ぽち / Pochi</i>
    <i class="sub">謎の人</i>
    
    <div class="stats">
    
      <div class="stat">
        <i>Photos</i>
        <i>958,336 <span>views</span></i>
      </div>
      
      <div class="stat">
        <i>Stream</i>
        <i>583,514 <span>views</span></i>
      </div>
      
      <div class="stat">
        <i>Albums</i>
        <i>225,955 <span>views</span></i>
      </div>
      
    </div><!-- / .stats -->
    
    <button class="popPhoto">Popular photos</button>
    
  </div><!-- / .right -->
  
  <div class="back">
    <span class="close">&times;</span>
    <div class="inner">
      <i class="head">Popular photos</i>
      <div class="imgs">
      <img class="backImg" src="http://farm8.static.flickr.com/7390/12980175743_5cb04727f3_q.jpg">
      <img class="backImg" src="http://farm4.static.flickr.com/3679/12980129103_edbea2fca4_q.jpg">
      <img class="backImg" src="http://farm6.static.flickr.com/5497/14367491417_563fcbc6a9_q.jpg">
      <img class="backImg" src="http://farm3.static.flickr.com/2573/12980150413_6982593c38_q.jpg">
      <img class="backImg" src="http://farm6.static.flickr.com/5497/14367491417_563fcbc6a9_q.jpg">
      <img class="backImg" src="http://farm3.static.flickr.com/2573/12980150413_6982593c38_q.jpg">
      <br class="clear">
      </div>
      <i class="link"><a href="https://www.flickr.com/photos/tommiehansen/" target="_blank">Visit Flickr photostream</a></i>
    </div>
  </div>
  
</div><!-- / .card -->
